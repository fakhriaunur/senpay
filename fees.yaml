# Fee configuration for Senpay.
# Loaded at server startup — changes require restart.
# See internal/fee/config.go for parsing and validation.

flat_fee_basic_sen: 2500      # Flat fee in sen for basic KYC transfers (Rp 2,500)
rate_verified_pct: 0.7        # Percentage fee for verified KYC transfers (0.7% = 0.007)
min_fee_sen: 1000             # Minimum fee in sen for verified KYC transfers (Rp 1,000)
